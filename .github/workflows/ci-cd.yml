name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS files from GitHub
        run: git lfs pull

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Write HF README
        run: |
          cat > README.md << 'README'
          ---
          title: Dot Camp 5 Selection Engine
          emoji: 🚀
          colorFrom: green
          colorTo: blue
          sdk: streamlit
          sdk_version: "1.32.0"
          python_version: "3.11"
          app_file: app.py
          pinned: false
          ---
          # Dot Camp 5 – Startup Selection Engine
          Automated startup screening tool for Dot Camp 5.
          README

      - name: Deploy via HF API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          token = os.environ["HF_TOKEN"]
          repo_id = "adamnouassida5/the_dot_camp5"

          files_to_upload = [
              "app.py",
              "engine.py",
              "mock_data.py",
              "requirements.txt",
              "README.md",
              "data/Selection des startups Dot Camp 5 (2).xlsx",
          ]

          for f in files_to_upload:
              if os.path.exists(f):
                  api.upload_file(
                      path_or_fileobj=f,
                      path_in_repo=f,
                      repo_id=repo_id,
                      repo_type="space",
                      token=token,
                  )
                  print("Uploaded: " + f)
              else:
                  print("Skipped: " + f)

          print("Deployment complete")
          PYEOF