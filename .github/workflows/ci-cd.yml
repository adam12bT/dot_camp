name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS files from GitHub
        run: git lfs pull

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload xlsx via HF API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          token = os.environ["HF_TOKEN"]

          api.upload_file(
              path_or_fileobj="data/Selection des startups Dot Camp 5 (2).xlsx",
              path_in_repo="data/Selection des startups Dot Camp 5 (2).xlsx",
              repo_id="adamnouassida5/the_dot_camp5",
              repo_type="space",
              token=token,
          )
          print("✅ Excel file uploaded to HF")
          PYEOF

      - name: Push code to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci-bot@github-actions"
          git config --global user.name "GitHub Actions"

          # Remove xlsx from git so HF doesn't reject the push
          git rm --cached "data/Selection des startups Dot Camp 5 (2).xlsx" || true
          git commit -m "remove xlsx from git tracking for HF push" || true

          git remote add hf https://adamnouassida5:${HF_TOKEN}@huggingface.co/spaces/adamnouassida5/the_dot_camp5

          for i in 1 2 3; do
            echo "Attempt $i..."
            git push hf main --force && echo "✅ Deploy successful" && exit 0
            echo "Failed, waiting 30s before retry..."
            sleep 30
          done

          echo "❌ All attempts failed"
          exit 1