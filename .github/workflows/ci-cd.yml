name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS files from GitHub
        run: git lfs pull

      - name: Push to Hugging Face Space (with retry)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci-bot@github-actions"
          git config --global user.name "GitHub Actions"

          # Allow incomplete LFS push (HF has its own LFS, it will handle the file)
          git config lfs.allowincompletepush true

          git remote add hf https://adamnouassida5:${HF_TOKEN}@huggingface.co/spaces/adamnouassida5/the_dot_camp5

          for i in 1 2 3; do
            echo "Attempt $i..."
            git push hf main --force && echo "✅ Deploy successful" && exit 0
            echo "Failed, waiting 30s before retry..."
            sleep 30
          done

          echo "❌ All attempts failed"
          exit 1